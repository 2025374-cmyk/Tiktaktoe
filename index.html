<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>Tic Tac Toe</h1>
  <h1>Raul's Tik Tak Toe</h1>


  <div id="status">Turno de X</div>

  <div class="board" id="board"></div>

  <button onclick="restartGame()">Reiniciar</button>

  <script>
    const board = document.getElementById("board");
    const status = document.getElementById("status");

    let currentPlayer = "X"; // Tú
    let gameActive = true;
    let gameState = ["", "", "", "", "", "", "", "", ""];

    const winningConditions = [
      [0, 1, 2],
      [3, 4, 5],
      [6, 7, 8],
      [0, 3, 6],
      [1, 4, 7],
      [2, 5, 8],
      [0, 4, 8],
      [2, 4, 6]
    ];

    function createBoard() {
      board.innerHTML = "";
      for (let i = 0; i < 9; i++) {
        const cell = document.createElement("div");
        cell.classList.add("cell");
        cell.dataset.index = i;
        cell.addEventListener("click", handleCellClick);
        board.appendChild(cell);
      }
    }

    function handleCellClick(e) {
      const index = e.target.dataset.index;

      if (gameState[index] !== "" || !gameActive || currentPlayer !== "X") return;

      makeMove(index, "X");

      if (!gameActive) return;

      // IA juega después de ti
      setTimeout(botMove, 400);
    }

    function makeMove(index, player) {
      if (gameState[index] !== "") return;

      gameState[index] = player;
      document.querySelector(`[data-index='${index}']`).textContent = player;

      if (checkWinner(player)) {
        status.textContent = `Ganó ${player}`;
        gameActive = false;
        return;
      }

      if (!gameState.includes("")) {
        status.textContent = "Empate";
        gameActive = false;
        return;
      }

      currentPlayer = player === "X" ? "O" : "X";
      status.textContent = `Turno de ${currentPlayer}`;
    }

    function botMove() {
      if (!gameActive) return;

      const index = getBestMove();
      makeMove(index, "O");
    }

    // IA básica: ganar > bloquear > aleatorio
    function getBestMove() {
      // 1. IA intenta ganar
      for (let [a, b, c] of winningConditions) {
        const line = [gameState[a], gameState[b], gameState[c]];
        if (line.filter(v => v === "O").length === 2 && line.includes("")) {
          return [a, b, c][line.indexOf("")];
        }
      }

      // 2. IA intenta bloquear a X
      for (let [a, b, c] of winningConditions) {
        const line = [gameState[a], gameState[b], gameState[c]];
        if (line.filter(v => v === "X").length === 2 && line.includes("")) {
          return [a, b, c][line.indexOf("")];
        }
      }

      // 3. Si no hay nada urgente, elige una casilla vacía al azar
      const emptyCells = gameState
        .map((v, i) => (v === "" ? i : null))
        .filter(v => v !== null);

      return emptyCells[Math.floor(Math.random() * emptyCells.length)];
    }

    function checkWinner(player) {
      return winningConditions.some(([a, b, c]) => {
        return (
          gameState[a] !== "" &&
          gameState[a] === gameState[b] &&
          gameState[a] === gameState[c]
        );
      });
    }

    function restartGame() {
      currentPlayer = "X";
      gameActive = true;
      gameState = ["", "", "", "", "", "", "", "", ""];
      status.textContent = "Turno de X";
      createBoard();
    }

    createBoard();
  </script>
</body>
</html>
