<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raul's Tik Tak Toe</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>Raul's Tik Tak Toe</h1>

  <!-- NOMBRES -->
  <div id="nameBox">
    <input type="text" id="playerName" placeholder="Tu nombre">
    <button onclick="setNames()">Guardar nombre</button>
    <button onclick="generateOpponent()">Generar oponente</button>
  </div>

  <h2 id="playersDisplay">Jugador: ---  |  Oponente: ---</h2>

  <!-- MARCADOR Y TIEMPO -->
  <h2 id="scoreboard">X: 0 | O: 0</h2>
  <h3 id="timer">Tiempo: 0s</h3>

  <div id="status">Turno de X</div>

  <!-- TABLERO -->
  <div class="board" id="board"></div>

  <button onclick="restartGame()">Reiniciar</button>

  <script>
    const board = document.getElementById("board");
    const status = document.getElementById("status");
    const playersDisplay = document.getElementById("playersDisplay");
    const scoreboard = document.getElementById("scoreboard");
    const timerDisplay = document.getElementById("timer");

    let playerName = "---";
    let opponentName = "---";

    let currentPlayer = "X";
    let gameActive = true;
    let gameState = ["", "", "", "", "", "", "", "", ""];

    let scoreX = 0;
    let scoreO = 0;

    let timer = 0;
    let timerInterval = null;

    const funnyNames = [
      "Sir PicklePants", "Captain Noodle", "Mr. FluffyFingers",
      "Lady Burrito", "Dr. BananaSmash", "Lord ChickenWing",
      "Professor GoofyFace", "Queen Marshmallow", "TurboToaster",
      "SneakyPancake"
    ];

    function setNames() {
      const input = document.getElementById("playerName").value.trim();
      playerName = input !== "" ? input : "Player X";
      updateNameDisplay();
    }

    function generateOpponent() {
      opponentName = funnyNames[Math.floor(Math.random() * funnyNames.length)];
      updateNameDisplay();
    }

    function updateNameDisplay() {
      playersDisplay.textContent = `Jugador: ${playerName}  |  Oponente: ${opponentName}`;
    }

    const winningConditions = [
      [0, 1, 2], [3, 4, 5], [6, 7, 8],
      [0, 3, 6], [1, 4, 7], [2, 5, 8],
      [0, 4, 8], [2, 4, 6]
    ];

    function startTimer() {
      timer = 0;
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timer++;
        timerDisplay.textContent = `Tiempo: ${timer}s`;
      }, 1000);
    }

    function createBoard() {
      board.innerHTML = "";
      for (let i = 0; i < 9; i++) {
        const cell = document.createElement("div");
        cell.classList.add("cell");
        cell.dataset.index = i;
        cell.addEventListener("click", handleCellClick);
        board.appendChild(cell);
      }
      startTimer();
    }

    function handleCellClick(e) {
      const index = e.target.dataset.index;

      if (gameState[index] !== "" || !gameActive || currentPlayer !== "X") return;

      makeMove(index, "X");

      if (!gameActive) return;

      setTimeout(botMove, 400);
    }

    function makeMove(index, player) {
      if (gameState[index] !== "") return;

      gameState[index] = player;
      document.querySelector(`[data-index='${index}']`).textContent = player;

      if (checkWinner(player)) {
        status.textContent = `Ganó ${player === "X" ? playerName : opponentName}`;
        gameActive = false;
        clearInterval(timerInterval);

        if (player === "X") scoreX++;
        else scoreO++;

        updateScoreboard();
        return;
      }

      if (!gameState.includes("")) {
        status.textContent = "Empate";
        gameActive = false;
        clearInterval(timerInterval);
        return;
      }

      currentPlayer = player === "X" ? "O" : "X";
      status.textContent = `Turno de ${currentPlayer}`;
    }

    function botMove() {
      if (!gameActive) return;

      const index = getBestMove();
      makeMove(index, "O");
    }

    function getBestMove() {
      for (let [a, b, c] of winningConditions) {
        const line = [gameState[a], gameState[b], gameState[c]];
        if (line.filter(v => v === "O").length === 2 && line.includes("")) {
          return [a, b, c][line.indexOf("")];
        }
      }

      for (let [a, b, c] of winningConditions) {
        const line = [gameState[a], gameState[b], gameState[c]];
        if (line.filter(v => v === "X").length === 2 && line.includes("")) {
          return [a, b, c][line.indexOf("")];
        }
      }

      const emptyCells = gameState
        .map((v, i) => (v === "" ? i : null))
        .filter(v => v !== null);

      return emptyCells[Math.floor(Math.random() * emptyCells.length)];
    }

    function checkWinner(player) {
      return winningConditions.some(([a, b, c]) => {
        return (
          gameState[a] !== "" &&
          gameState[a] === gameState[b] &&
          gameState[a] === gameState[c]
        );
      });
    }

    function updateScoreboard() {
      scoreboard.textContent = `X: ${scoreX} | O: ${scoreO}`;
    }

    function restartGame() {
      currentPlayer = "X";
      gameActive = true;
      gameState = ["", "", "", "", "", "", "", "", ""];
      status.textContent = "Turno de X";
      createBoard();
    }

    createBoard();
  </script>
</body>
</html>
