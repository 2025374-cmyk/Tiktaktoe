<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raul's Tik Tak Toe</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>Raul's Tik Tak Toe</h1>

  <!-- NOMBRES -->
  <div id="nameBox">
    <input type="text" id="player1Name" placeholder="Nombre Jugador 1 (X)">
    <input type="text" id="player2Name" placeholder="Nombre Jugador 2 (O)">
    <button onclick="setNames()">Guardar nombres</button>
  </div>

  <h2 id="playersDisplay">Jugador X: ---  |  Jugador O: ---</h2>

  <!-- MARCADOR Y TIEMPO -->
  <h2 id="scoreboard">X: 0 | O: 0</h2>
  <h3 id="timer">Tiempo: 0s</h3>

  <div id="status">Turno de X</div>

  <!-- TABLERO -->
  <div class="board" id="board"></div>

  <button onclick="restartGame()">Reiniciar</button>

  <script>
    const board = document.getElementById("board");
    const status = document.getElementById("status");
    const playersDisplay = document.getElementById("playersDisplay");
    const scoreboard = document.getElementById("scoreboard");
    const timerDisplay = document.getElementById("timer");

    let player1Name = "---";
    let player2Name = "---";

    let currentPlayer = "X";
    let gameActive = true;
    let gameState = ["", "", "", "", "", "", "", "", ""];

    let scoreX = 0;
    let scoreO = 0;

    let timer = 0;
    let timerInterval = null;

    function setNames() {
      const p1 = document.getElementById("player1Name").value.trim();
      const p2 = document.getElementById("player2Name").value.trim();

      player1Name = p1 !== "" ? p1 : "Jugador X";
      player2Name = p2 !== "" ? p2 : "Jugador O";

      updateNameDisplay();
    }

    function updateNameDisplay() {
      playersDisplay.textContent = `Jugador X: ${player1Name}  |  Jugador O: ${player2Name}`;
    }

    const winningConditions = [
      [0, 1, 2], [3, 4, 5], [6, 7, 8],
      [0, 3, 6], [1, 4, 7], [2, 5, 8],
      [0, 4, 8], [2, 4, 6]
    ];

    function startTimer() {
      timer = 0;
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timer++;
        timerDisplay.textContent = `Tiempo: ${timer}s`;
      }, 1000);
    }

    function createBoard() {
      board.innerHTML = "";
      for (let i = 0; i < 9; i++) {
        const cell = document.createElement("div");
        cell.classList.add("cell");
        cell.dataset.index = i;
        cell.addEventListener("click", handleCellClick);
        board.appendChild(cell);
      }
      startTimer();
    }

    function handleCellClick(e) {
      const index = e.target.dataset.index;

      if (gameState[index] !== "" || !gameActive) return;

      makeMove(index, currentPlayer);
    }

    function makeMove(index, player) {
      gameState[index] = player;
      document.querySelector(`[data-index='${index}']`).textContent = player;

      if (checkWinner(player)) {
        const winnerName = player === "X" ? player1Name : player2Name;
        status.textContent = `Ganó ${winnerName}`;
        gameActive = false;
        clearInterval(timerInterval);

        if (player === "X") scoreX++;
        else scoreO++;

        updateScoreboard();
        return;
      }

      if (!gameState.includes("")) {
        status.textContent = "Empate";
        gameActive = false;
        clearInterval(timerInterval);
        return;
      }

      currentPlayer = player === "X" ? "O" : "X";
      status.textContent = `Turno de ${currentPlayer}`;
    }

    function checkWinner(player) {
      return winningConditions.some(([a, b, c]) => {
        return (
          gameState[a] === player &&
          gameState[b] === player &&
          gameState[c] === player
        );
      });
    }

    function updateScoreboard() {
      scoreboard.textContent = `X: ${scoreX} | O: ${scoreO}`;
    }

    function restartGame() {
      currentPlayer = "X";
      gameActive = true;
      gameState = ["", "", "", "", "", "", "", "", ""];
      status.textContent = "Turno de X";
      createBoard();
    }

    createBoard();
  </script>
</body>
</html>
